name = "doh-edge"
main = "build/index.js"
compatibility_date = "2026-04-24"

[build]
command = "cargo install -q \"worker-build@^0.8\" && worker-build --release"

[[durable_objects.bindings]]
name = "RESOLVER"
class_name = "Resolver"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["Resolver"]

[[analytics_engine_datasets]]
binding = "QUERIES"
dataset = "doh_edge_queries_v2"

[observability]
[observability.logs]
enabled = true
invocation_logs = true
